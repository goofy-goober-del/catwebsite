<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Cursor Website</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #f7f7f7;
    font-family: Arial, sans-serif;
  }

  #cat-cursor-face {
    position: absolute;
    pointer-events: none;
    width: 60px;
    height: 60px;
    z-index: 999999;
  }

  .site-link {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 20px;
    color: blue;
    z-index: 999999;
  }
</style>
</head>

<body>

<!-- Your website link -->
<a class="site-link" href="https://example.com" target="_blank">
  Visit My Website
</a>

<script>
// Cat image URL
const CAT_IMG_URL = "https://i.imgur.com/3aX9QhF.png";

// Remove old listener if reloaded
document.removeEventListener('mousemove', window._catMoveListener || (() => {}));

window._catMoveListener = function (e) {
  // Remove existing cat
  const oldCat = document.getElementById('cat-cursor-face');
  if (oldCat) oldCat.remove();

  // Create new cat image
  const cat = document.createElement('img');
  cat.id = 'cat-cursor-face';
  cat.src = CAT_IMG_URL;

  // Position at cursor
  cat.style.left = e.pageX + 'px';
  cat.style.top = e.pageY + 'px';

  document.body.appendChild(cat);

  // Remove after 300ms
  setTimeout(() => {
    if (cat.parentNode) cat.remove();
  }, 300);
};

document.addEventListener('mousemove', window._catMoveListener);
</script>

</body>
</html>
